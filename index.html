<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALBETTTT</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  overflow: hidden;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
}

#bg-prev, #bg {
  position: fixed; inset: 0; z-index: 0;
  background-size: cover; background-position: center;
  transition: opacity 1s ease;
}
#bg-prev { opacity: 0; }
.bg-overlay {
  position: fixed; inset: 0; z-index: 1;
  background: rgba(0,0,0,0.45);
}

.layout {
  position: relative; z-index: 2;
  width: 100vw; height: 100vh;
  display: grid;
  grid-template-columns: 1fr 420px 1fr;
  align-items: center;
  padding: 0 40px;
}


.panel-left {
  display: flex; flex-direction: column;
  gap: 24px; padding-right: 48px;
}
.brand .logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.8rem; font-weight: 600;
  line-height: 1; letter-spacing: -0.02em;
  text-shadow: 0 2px 30px rgba(255,255,255,0.15);
}
.brand .tagline {
  font-size: 0.72rem; letter-spacing: 0.2em;
  text-transform: uppercase; opacity: 0.4; margin-top: 4px;
}
.pl-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.pl-label { font-size:0.62rem; letter-spacing:0.2em; text-transform:uppercase; opacity:0.4; }
.pl-count {
  font-size:0.6rem; letter-spacing:0.1em;
  background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15);
  border-radius:20px; padding:2px 10px; opacity:0.7;
}
.pl-scroll {
  max-height:300px; overflow-y:auto; overflow-x:hidden;
  scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.18) transparent; padding-right:4px;
}
.pl-scroll::-webkit-scrollbar { width:4px; }
.pl-scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.18); border-radius:10px; }
.pl-item {
  display:flex; align-items:center; gap:14px;
  padding:10px 14px; border-radius:14px;
  cursor:pointer; border:1px solid transparent;
  transition:all 0.25s; position:relative; overflow:hidden; margin-bottom:4px;
}
.pl-item::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  background:#fff; transform:scaleY(0); transform-origin:center;
  transition:transform 0.3s; border-radius:0 2px 2px 0;
}
.pl-item:hover { background:rgba(255,255,255,0.07); }
.pl-item.active { background:rgba(255,255,255,0.11); border-color:rgba(255,255,255,0.16); }
.pl-item.active::before { transform:scaleY(1); }
.pl-num { font-size:0.72rem; opacity:0.4; width:18px; text-align:center; }
.pl-item.active .pl-num { display:none; }
.pl-eq { display:none; align-items:flex-end; gap:2px; width:18px; height:16px; }
.pl-item.active .pl-eq { display:flex; }
.pl-eq-bar { width:3px; background:#fff; border-radius:2px; animation:eqbar 0.7s ease-in-out infinite; }
.pl-eq-bar:nth-child(1){height:6px;animation-delay:0s}
.pl-eq-bar:nth-child(2){height:14px;animation-delay:0.2s}
.pl-eq-bar:nth-child(3){height:8px;animation-delay:0.1s}
.pl-item.paused .pl-eq-bar { animation-play-state:paused; }
@keyframes eqbar{0%,100%{transform:scaleY(0.3)}50%{transform:scaleY(1)}}
.pl-info { flex:1; min-width:0; }
.pl-name { font-size:0.86rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pl-artist { font-size:0.7rem; opacity:0.4; margin-top:2px; }
.left-quote {
  font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1rem;
  opacity:0.32; line-height:1.7; border-left:2px solid rgba(255,255,255,0.22);
  padding-left:14px; max-width:260px; transition:opacity 0.5s;
}


.player-center { display:flex; flex-direction:column; align-items:center; }


.carousel-area {
  width: 420px;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 16px;
}




.carousel-viewport {
  width: 420px;
  height: 240px;
  position: relative;
  overflow: hidden;
 
  -webkit-mask-image: linear-gradient(to right, transparent 0%, black 16%, black 84%, transparent 100%);
  mask-image: linear-gradient(to right, transparent 0%, black 16%, black 84%, transparent 100%);
  cursor: grab;
  isolation: isolate;
}
.carousel-viewport:active { cursor: grabbing; }


.carousel-stage { position: absolute; inset: 0; }

.c-card {
  position: absolute;
  top: 50%; left: 50%;
  border-radius: 18px;
  overflow: hidden;
  will-change: transform, width, height, opacity, filter;
  transition:
    transform 0.42s cubic-bezier(0.25,0.46,0.45,0.94),
    width     0.42s cubic-bezier(0.25,0.46,0.45,0.94),
    height    0.42s cubic-bezier(0.25,0.46,0.45,0.94),
    opacity   0.38s ease,
    filter    0.38s ease,
    box-shadow 0.38s ease;
}
.c-card img {
  width:100%; height:100%; object-fit:cover; display:block; pointer-events:none;
}
.c-card .c-ph {
  width:100%; height:100%;
  background:linear-gradient(135deg,#1a1a2e,#16213e);
  display:flex; align-items:center; justify-content:center; font-size:3rem;
}
.c-shine {
  position:absolute; inset:0; pointer-events:none;
  background:linear-gradient(135deg,rgba(255,255,255,0.1) 0%,transparent 55%);
}


.carousel-dots { display:flex; gap:5px; justify-content:center; margin-top:12px; }
.c-dot { height:4px; width:14px; border-radius:3px; background:rgba(255,255,255,0.25); transition:all 0.35s; }
.c-dot.active { background:#fff; width:22px; }


.song-meta { text-align:center; margin-bottom:14px; width:100%; }
.song-title {
  font-family:'Cormorant Garamond',serif; font-size:1.7rem; font-weight:600;
  letter-spacing:-0.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.song-artist { font-size:0.78rem; font-weight:300; opacity:0.5; margin-top:3px; }


.prog-wrap { width:100%; margin-bottom:8px; }
.prog-bg { height:3px; background:rgba(255,255,255,0.14); border-radius:10px; cursor:pointer; position:relative; }
.prog-fill {
  height:100%; background:linear-gradient(90deg,var(--ca,#f0c27f),var(--cb,#e8a0bf));
  border-radius:10px; width:0%; transition:width 0.25s linear;
}
.prog-fill::after {
  content:''; position:absolute; right:-5px; top:50%; transform:translateY(-50%);
  width:11px; height:11px; border-radius:50%; background:#fff;
  box-shadow:0 0 6px rgba(255,255,255,0.4); opacity:0; transition:opacity 0.2s;
}
.prog-bg:hover .prog-fill::after { opacity:1; }
.time-row { display:flex; justify-content:space-between; font-size:0.68rem; opacity:0.4; margin-top:6px; }


.controls { display:flex; align-items:center; justify-content:center; gap:14px; margin:6px 0 12px; }
.ctrl {
  background:none; border:none; color:rgba(255,255,255,0.4);
  cursor:pointer; font-size:1.1rem; padding:8px; border-radius:50%; transition:all 0.2s;
}
.ctrl:hover { color:#fff; transform:scale(1.15); }
.ctrl.on { color:#fff; }
.play-btn {
  width:58px; height:58px; border-radius:50%; border:none; cursor:pointer;
  background:#fff; color:#111;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 8px 28px rgba(255,255,255,0.22); transition:all 0.2s;
  padding:0; line-height:1;
}
.play-btn:hover { transform:scale(1.08); }


.vol-row { display:flex; align-items:center; gap:10px; width:100%; }
.vol-icon { opacity:0.5; min-width:20px; height:20px; display:flex; align-items:center; }
.vol-icon svg { width:18px; height:18px; fill:none; stroke:#fff; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
input.vol-sl {
  flex:1; -webkit-appearance:none; height:2px; border-radius:10px;
  background:rgba(255,255,255,0.17); outline:none; cursor:pointer;
}
input.vol-sl::-webkit-slider-thumb {
  -webkit-appearance:none; width:11px; height:11px; border-radius:50%; background:#fff; cursor:pointer;
}


.panel-right { display:flex; flex-direction:column; gap:28px; padding-left:48px; }
.now-card {
  background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.11);
  border-radius:18px; padding:22px 20px; backdrop-filter:blur(20px);
}
.nc-label { font-size:0.62rem; letter-spacing:0.2em; text-transform:uppercase; opacity:0.38; margin-bottom:12px; }
.nc-title { font-family:'Cormorant Garamond',serif; font-size:1.3rem; font-weight:600; line-height:1.25; }
.nc-artist { font-size:0.76rem; opacity:0.45; margin-top:3px; }
.key-hints { display:flex; flex-direction:column; gap:7px; }
.kh-label { font-size:0.62rem; letter-spacing:0.2em; text-transform:uppercase; opacity:0.35; margin-bottom:3px; }
.kh-row { display:flex; align-items:center; gap:10px; }
.key {
  background:rgba(255,255,255,0.09); border:1px solid rgba(255,255,255,0.14);
  border-radius:6px; padding:3px 8px; font-size:0.68rem;
  font-family:monospace; color:rgba(255,255,255,0.55);
}
.kh-desc { font-size:0.72rem; opacity:0.38; }

@media(max-width:960px){
  body { overflow-y:auto; }
  .layout { grid-template-columns:1fr; height:auto; min-height:100vh; padding:40px 20px; gap:28px; }
  .panel-left,.panel-right { padding:0; align-items:center; }
  .left-quote { max-width:100%; text-align:center; }
  .pl-scroll { max-height:180px; }
  .carousel-area, .carousel-viewport { width:340px; }
}
</style>
</head>
<body>

<div id="bg-prev"></div>
<div id="bg"></div>
<div class="bg-overlay"></div>

<div class="layout">


  <div class="panel-left">
    <div class="brand">
      <div class="logo">Norman F RockWell</div>
      <div class="tagline">L & R</div>
    </div>
    <div>
      <div class="pl-header">
        <div class="pl-label">Playlist</div>
        <div class="pl-count" id="pl-count">— songs</div>
      </div>
      <div class="pl-scroll" id="playlist"></div>
    </div>
    <div class="left-quote" id="left-quote">"it's all about music"</div>
  </div>

  
  <div class="player-center">

    <div class="carousel-area">
      <div class="carousel-viewport" id="carousel-viewport">
        <div class="carousel-stage" id="carousel-stage"></div>
      </div>
      <div class="carousel-dots" id="carousel-dots"></div>
    </div>

    <div class="song-meta">
      <div class="song-title" id="song-title">Pilih lagu</div>
      <div class="song-artist" id="song-artist">—</div>
    </div>

    <div class="prog-wrap">
      <div class="prog-bg" id="prog-bg"><div class="prog-fill" id="prog-fill"></div></div>
      <div class="time-row"><span id="t-cur">0:00</span><span id="t-dur">0:00</span></div>
    </div>

    <div class="controls">
      <button class="ctrl" id="btn-shuf" title="Shuffle">
  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
  </svg>
</button>
      <button class="ctrl" id="btn-prev">
  <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
    <polygon points="19,20 9,12 19,4"/><rect x="5" y="4" width="2.5" height="16" rx="1"/>
  </svg>
</button>
      <button class="play-btn" id="btn-play">
  <svg id="icon-play" viewBox="0 0 24 24" width="22" height="22" fill="#111" xmlns="http://www.w3.org/2000/svg"><polygon points="6,3 20,12 6,21"/></svg>
  <svg id="icon-pause" viewBox="0 0 24 24" width="22" height="22" fill="#111" xmlns="http://www.w3.org/2000/svg" style="display:none"><rect x="5" y="3" width="4" height="18" rx="1"/><rect x="15" y="3" width="4" height="18" rx="1"/></svg>
</button>
      <button class="ctrl" id="btn-next">
  <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
    <polygon points="5,4 15,12 5,20"/><rect x="16.5" y="4" width="2.5" height="16" rx="1"/>
  </svg>
</button>
      <button class="ctrl" id="btn-rep" title="Repeat">
  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
  </svg>
</button>
    </div>

    <div class="vol-row">
      <span class="vol-icon" id="vol-icon">
  <svg viewBox="0 0 24 24"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
</span>
      <input type="range" class="vol-sl" id="vol-sl" min="0" max="100" value="80">
    </div>

  </div>

  
  <div class="panel-right">
    <div class="now-card">
      <div class="nc-label">Now Playing</div>
      <div class="nc-title" id="nc-title">—</div>
      <div class="nc-artist" id="nc-artist">—</div>
    </div>
    <div class="key-hints">
      <div class="kh-label">Keyboard Shortcut</div>
      <div class="kh-row"><span class="key">Space</span><span class="kh-desc">Play / Pause</span></div>
      <div class="kh-row"><span class="key">→</span><span class="kh-desc">Next Song</span></div>
      <div class="kh-row"><span class="key">←</span><span class="kh-desc">Previous Song</span></div>
      <div class="kh-row"><span class="key">↑ ↓</span><span class="kh-desc">Volume</span></div>
    </div>
  </div>

</div>

<audio id="audio"></audio>

<script>
const GLOBAL_BG = "url('https://i.ibb.co.com/JWWXH7Th/Whats-App-Image-2026-03-28-at-16-54-16.jpg')";

const TRACKS = [
  { name:'Here With Me',  artist:'Rian4Css', src:'https://raw.githubusercontent.com/albetpowder-blip/web-personal/main/d4vd%20-%20Here%20With%20Me%20%5BOfficial%20Music%20Video%5D.mp3', cover:'https://i.pinimg.com/736x/be/87/90/be879008fb3e8655779e7c16b24bc2df.jpg', accentA:'#a78bfa', accentB:'#818cf8', quote:"i don't care how long it takes" },
  { name:'A Piece of You',artist:'Karyn',    src:'https://files.catbox.moe/iv5akq.mp3', cover:'https://i.ibb.co.com/HD7JXRYf/Whats-App-Image-2026-03-28-at-15-17-32.jpg', accentA:'#fb923c', accentB:'#f43f5e', quote:'my heart belongs to you' },
  { name:'Secret Door',   artist:'Rian4Css', src:'https://files.catbox.moe/j0gmdn.mp3', cover:'https://i.pinimg.com/736x/62/a4/cf/62a4cf202d7ead45ae7d064dd0a705ca.jpg', accentA:'#34d399', accentB:'#06b6d4', quote:"i don't know" },
  { name:'Sssst...',      artist:'Karyn',    src:'https://files.catbox.moe/yaotpo.mp3', cover:'https://i.ibb.co.com/fVmq80NQ/Whats-App-Image-2026-03-28-at-15-18-18.jpg', accentA:'#f472b6', accentB:'#ec4899', quote:'Ssstt...' },
  { name:'Home',          artist:'Rian4Css', src:'https://files.catbox.moe/h6sr4q.mp3', cover:'https://i.pinimg.com/736x/c9/15/bb/c915bb806de294071176f3204050d129.jpg', accentA:'#fbbf24', accentB:'#f59e0b', quote:'nevermind' },
  { name:'If only',       artist:'Karyn',    src:'https://files.catbox.moe/8swp77.mp3', cover:'https://i.ibb.co.com/tFPSw6v/Whats-App-Image-2026-03-28-at-15-18-18-1.jpg', accentA:'#60a5fa', accentB:'#3b82f6', quote:'whatever la' },
];


const audio        = document.getElementById('audio');
const btnPlay      = document.getElementById('btn-play');
const btnPrev      = document.getElementById('btn-prev');
const btnNext      = document.getElementById('btn-next');
const btnRep       = document.getElementById('btn-rep');
const btnShuf      = document.getElementById('btn-shuf');
const progFill     = document.getElementById('prog-fill');
const progBg       = document.getElementById('prog-bg');
const tCur         = document.getElementById('t-cur');
const tDur         = document.getElementById('t-dur');
const bgEl         = document.getElementById('bg');
const bgPrev       = document.getElementById('bg-prev');
const volSl        = document.getElementById('vol-sl');
const volIcon      = document.getElementById('vol-icon');
const playlistEl   = document.getElementById('playlist');
const stage        = document.getElementById('carousel-stage');
const dotsEl       = document.getElementById('carousel-dots');
const viewport     = document.getElementById('carousel-viewport');

let cur = 0, playing = false, repeat = false, shuffle = false;
document.getElementById('pl-count').textContent = TRACKS.length + ' songs';

const fmt = s => isNaN(s)||!s?'0:00':`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;


const A = 220; 
const S = 148; 
const F = 100; 
const G = 20;  



function cardCenterOffset(rel) {
  if (rel === 0) return 0;
  const sign = Math.sign(rel);
  const abs  = Math.abs(rel);
  let offset = A/2 + G + S/2; 
  for (let s = 1; s < abs; s++) {
    const prevSize = s === 1 ? S : F;
    const nextSize = F;
    offset += prevSize/2 + G + nextSize/2;
  }
  return sign * offset;
}


function buildCarousel() {
  stage.innerHTML = '';
  dotsEl.innerHTML = '';
  TRACKS.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'c-card';
    card.dataset.i = i;
    if (t.cover) {
      const img = document.createElement('img');
      img.src = t.cover; img.alt = t.name;
      card.appendChild(img);
    } else {
      const ph = document.createElement('div');
      ph.className = 'c-ph';
      ph.textContent = ['🎵','🎸','🎹','🎶','🎼','🎧'][i%6];
      card.appendChild(ph);
    }
    const shine = document.createElement('div');
    shine.className = 'c-shine';
    card.appendChild(shine);
    
    card.addEventListener('click', () => { if (i !== cur) loadTrack(i, true); });
    stage.appendChild(card);

    const dot = document.createElement('div');
    dot.className = 'c-dot';
    dotsEl.appendChild(dot);
  });
  applyLayout(false);
}


function applyLayout(animate = true) {
  const vpW  = viewport.offsetWidth  || 420;
  const vpH  = viewport.offsetHeight || 240;
  const cards = stage.querySelectorAll('.c-card');

  cards.forEach((card, i) => {
    const rel = i - cur;
    const abs = Math.abs(rel);

    let size, opacity, filter, shadow, zIndex;
    if (abs === 0) {
      size = A; opacity = 1; filter = 'brightness(1) saturate(1)';
      shadow = '0 24px 70px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.1)';
      zIndex = 10;
    } else if (abs === 1) {
      size = S; opacity = 0.62; filter = 'brightness(0.6) saturate(0.65)';
      shadow = '0 8px 24px rgba(0,0,0,0.4)';
      zIndex = 5;
    } else {
      size = F; opacity = 0.22; filter = 'brightness(0.35) saturate(0.3)';
      shadow = 'none'; zIndex = 1;
    }

    const centerOffset = cardCenterOffset(rel);
    
    const left = vpW/2 + centerOffset - size/2;
    const top  = vpH/2 - size/2;

    if (!animate) {
      card.style.transition = 'none';
      setCardStyle(card, left, top, size, opacity, filter, shadow, zIndex);
      card.offsetHeight; 
      card.style.transition = '';
    } else {
      setCardStyle(card, left, top, size, opacity, filter, shadow, zIndex);
    }
  });

  
  dotsEl.querySelectorAll('.c-dot').forEach((d,i) => d.classList.toggle('active', i===cur));
}

function setCardStyle(card, left, top, size, opacity, filter, shadow, zIndex) {
  card.style.left      = left + 'px';
  card.style.top       = top + 'px';
  card.style.width     = size + 'px';
  card.style.height    = size + 'px';
  card.style.opacity   = opacity;
  card.style.filter    = filter;
  card.style.boxShadow = shadow;
  card.style.zIndex    = zIndex;
  card.style.transform = ''; 
}

function applyAccent(t) {
  document.documentElement.style.setProperty('--ca', t.accentA);
  document.documentElement.style.setProperty('--cb', t.accentB);
}
function crossfadeBg() {
  bgPrev.style.backgroundImage = bgEl.style.backgroundImage || 'none';
  bgPrev.style.opacity = '1';
  bgEl.style.backgroundImage = GLOBAL_BG;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ bgPrev.style.opacity='0'; }));
}

function loadTrack(idx, autoplay=false) {
  cur = idx;
  const t = TRACKS[idx];
  document.getElementById('song-title').textContent  = t.name;
  document.getElementById('song-artist').textContent = t.artist;
  document.getElementById('nc-title').textContent    = t.name;
  document.getElementById('nc-artist').textContent   = t.artist;
  document.getElementById('left-quote').textContent  = t.quote;
  crossfadeBg();
  applyAccent(t);
  applyLayout(true);
  audio.src = t.src;
  if (autoplay) { audio.play().catch(()=>{}); playing=true; }
  else playing=false;
  updateUI();
}

function updateUI() {
  document.getElementById('icon-play').style.display  = playing ? 'none' : 'block';
  document.getElementById('icon-pause').style.display = playing ? 'block' : 'none';
  renderPlaylist();
}

function renderPlaylist() {
  playlistEl.innerHTML = '';
  TRACKS.forEach((t,i) => {
    const d = document.createElement('div');
    d.className = 'pl-item'+(i===cur?' active':'')+(i===cur&&!playing?' paused':'');
    d.innerHTML = `
      <div class="pl-num">${i+1}</div>
      <div class="pl-eq"><div class="pl-eq-bar"></div><div class="pl-eq-bar"></div><div class="pl-eq-bar"></div></div>
      <div class="pl-info"><div class="pl-name">${t.name}</div><div class="pl-artist">${t.artist}</div></div>`;
    d.onclick = () => loadTrack(i, true);
    playlistEl.appendChild(d);
  });
  const active = playlistEl.querySelector('.pl-item.active');
  if (active) active.scrollIntoView({block:'nearest',behavior:'smooth'});
}


btnPlay.onclick = () => {
  if (!audio.src || audio.src===location.href) { loadTrack(cur,true); return; }
  playing ? audio.pause() : audio.play().catch(()=>{});
};
btnNext.onclick = () => {
  const n = shuffle ? Math.floor(Math.random()*TRACKS.length) : (cur+1)%TRACKS.length;
  loadTrack(n, true);
};
btnPrev.onclick = () => {
  if (audio.currentTime>3) { audio.currentTime=0; return; }
  loadTrack((cur-1+TRACKS.length)%TRACKS.length, playing);
};
btnRep.onclick  = () => { repeat=!repeat; audio.loop=repeat; btnRep.classList.toggle('on',repeat); };
btnShuf.onclick = () => { shuffle=!shuffle; btnShuf.classList.toggle('on',shuffle); };

/* yhee audioo */
audio.addEventListener('play',  ()=>{ playing=true;  updateUI(); });
audio.addEventListener('pause', ()=>{ playing=false; updateUI(); });
audio.addEventListener('ended', ()=>{
  if (repeat) return;
  const next = shuffle ? Math.floor(Math.random()*TRACKS.length) : (cur+1)%TRACKS.length;
  loadTrack(next, true);
});
audio.addEventListener('timeupdate', ()=>{
  if (!audio.duration) return;
  progFill.style.width = (audio.currentTime/audio.duration*100)+'%';
  tCur.textContent = fmt(audio.currentTime);
  tDur.textContent = fmt(audio.duration);
});
progBg.onclick = e => {
  if (!audio.duration) return;
  const r = progBg.getBoundingClientRect();
  audio.currentTime = (e.clientX-r.left)/r.width*audio.duration;
};
volSl.oninput = ()=>{
  audio.volume = volSl.value/100;
  const vv = +volSl.value;
  volIcon.innerHTML = vv === 0
    ? '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>'
    : vv < 50
    ? '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>'
    : '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';
};
audio.volume = 0.8;

document.addEventListener('keydown', e=>{
  if (e.target.tagName==='INPUT') return;
  if (e.code==='Space')      { e.preventDefault(); btnPlay.click(); }
  if (e.code==='ArrowRight') btnNext.click();
  if (e.code==='ArrowLeft')  btnPrev.click();
  if (e.code==='ArrowUp')    { volSl.value=Math.min(100,+volSl.value+5); volSl.oninput(); }
  if (e.code==='ArrowDown')  { volSl.value=Math.max(0,+volSl.value-5); volSl.oninput(); }
});

const SWIPE_MIN = 40;
let dragStartX = 0, dragCurX = 0, isDragging = false;
// nitip sini
let dragDelta = 0;

function dragStart(x) {
  isDragging = true;
  dragStartX = dragCurX = x;
  dragDelta  = 0;
}
function dragMove(x) {
  if (!isDragging) return;
  dragCurX  = x;
  dragDelta = x - dragStartX;

  const cards = stage.querySelectorAll('.c-card');
  const vpW   = viewport.offsetWidth || 420;
  cards.forEach((card, i) => {
    const rel  = i - cur;
    const abs  = Math.abs(rel);
    let size = abs===0 ? A : abs===1 ? S : F;
    const centerOffset = cardCenterOffset(rel);
    const baseLeft = vpW/2 + centerOffset - size/2;
    card.style.transition = 'none';
    card.style.left = (baseLeft + dragDelta) + 'px';
  });
}
function dragEnd() {
  if (!isDragging) return;
  isDragging = false;

  if (dragDelta < -SWIPE_MIN && cur < TRACKS.length-1) {
    loadTrack(cur+1, true);
  } else if (dragDelta > SWIPE_MIN && cur > 0) {
    loadTrack(cur-1, true);
  } else {
    
    applyLayout(true);
  }
  dragDelta = 0;
}


viewport.addEventListener('touchstart', e => dragStart(e.touches[0].clientX), {passive:true});
viewport.addEventListener('touchmove',  e => { e.preventDefault(); dragMove(e.touches[0].clientX); }, {passive:false});
viewport.addEventListener('touchend',   ()  => dragEnd());
viewport.addEventListener('touchcancel',()  => { isDragging=false; applyLayout(true); });


viewport.addEventListener('mousedown',  e  => { dragStart(e.clientX); e.preventDefault(); });
document.addEventListener('mousemove',  e  => dragMove(e.clientX));
document.addEventListener('mouseup',    ()  => dragEnd());


buildCarousel();
loadTrack(0, false);
</script>
